# Nginx Reverse Proxy Configuration for pandyaHomeLab
# Per ADR-019: Internet Access from NAS & Domain Routing

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    upstream ml_projects {
        server ml-iris-knn:8000 max_fails=3 fail_timeout=30s;
    }

    upstream ml_housing {
        server ml-housing-linear:8000 max_fails=3 fail_timeout=30s;
    }

    upstream ml_mlflow {
        server ml-mlflow:5000 max_fails=3 fail_timeout=30s;
    }


    # HTTP server (redirect to HTTPS)
    server {
        listen 80;
        server_name pandyahomelab.com www.pandyahomelab.com;
        return 301 https://$server_name$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name pandyahomelab.com www.pandyahomelab.com;

        # SSL Configuration
        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # SSL Security
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Gzip
        gzip on;
        gzip_types text/plain text/css application/json application/javascript;
        gzip_min_length 1000;

        # Logging
        access_log /var/log/nginx/access.log combined;
        error_log /var/log/nginx/error.log warn;

        # Health check
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Landing page
        location / {
            root /var/www/html;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "public, max-age=3600";
        }

        # ML domain routes — each project gets its own sub-path per ADR-004
        location /ml/iris-knn/ {
            proxy_pass http://ml_projects/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /ml/housing-linear/ {
            proxy_pass http://ml_housing/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # /ml/ root — ML domain listing
        location = /ml/ {
            return 200 '{"domain":"ml","projects":["iris-knn","housing-linear"],"status":"active"}';
            add_header Content-Type application/json;
        }

        # DL, NLP, Agentic — coming soon (no upstream blocks until containers exist)
        location /dl/ {
            return 503 '{"status":"coming_soon","domain":"dl"}';
            add_header Content-Type application/json;
        }

        location /nlp/ {
            return 503 '{"status":"coming_soon","domain":"nlp"}';
            add_header Content-Type application/json;
        }

        location /agentic/ {
            return 503 '{"status":"coming_soon","domain":"agentic"}';
            add_header Content-Type application/json;
        }

        # MLflow UI — experiment tracking
        location /mlflow/ {
            proxy_pass http://ml_mlflow/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # MLflow API — browser JS calls these without the /mlflow/ prefix
        location /api/2.0/mlflow {
            proxy_pass http://ml_mlflow/api/2.0/mlflow;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ajax-api/2.0/mlflow {
            proxy_pass http://ml_mlflow/ajax-api/2.0/mlflow;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
