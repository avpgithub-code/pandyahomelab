version: '3.8'

# ML Domain Infrastructure & Projects
# Each service connects to ml-network (172.20.0.0/24, isolated)

networks:
  ml-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/24
          gateway: 172.20.0.1

services:
  # Infrastructure Services (shared by 2 projects per domain)

  ml-postgres:
    image: postgres:16-alpine
    container_name: ml-postgres
    environment:
      POSTGRES_DB: ${ML_POSTGRES_DB:-mldb}
      POSTGRES_USER: ${ML_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${ML_POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - ml_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ML_POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      ml-network:
        ipv4_address: 172.20.0.2
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ml-minio:
    image: minio/minio:latest
    container_name: ml-minio
    environment:
      MINIO_ROOT_USER: ${ML_MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${ML_MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ml_minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      ml-network:
        ipv4_address: 172.20.0.3
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ml-redis:
    image: redis:7-alpine
    container_name: ml-redis
    ports:
      - "6379:6379"
    volumes:
      - ml_redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      ml-network:
        ipv4_address: 172.20.0.4
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ml-mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: ml-mlflow
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://ml-minio:9000
      AWS_ACCESS_KEY_ID: ${ML_MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${ML_MINIO_ROOT_PASSWORD}
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow/mlruns.db
      --default-artifact-root s3://ml-artifacts/artifacts
      --serve-artifacts
      --host 0.0.0.0
      --port 5000
    ports:
      - "5000:5000"
    volumes:
      - ml_mlflow_data:/mlflow
    depends_on:
      ml-minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      ml-network:
        ipv4_address: 172.20.0.5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Project Services (placeholder — built from ml/ml-iris-knn/ and ml/ml-housing/)
  # These will be added in docker-compose.dev.yml with source mounts

volumes:
  ml_postgres_data:
  ml_minio_data:
  ml_redis_data:
  ml_mlflow_data:
