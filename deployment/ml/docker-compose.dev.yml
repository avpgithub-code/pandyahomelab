version: '3.8'

# Dev overlay: adds ML project containers to the ml-network infrastructure stack
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:
  ml-iris-knn:
    image: ml-iris-knn:latest
    container_name: ml-iris-knn
    environment:
      PYTHONPATH: /app
      MLFLOW_TRACKING_URI: http://ml-mlflow:5000
    ports:
      - "8001:8000"
    networks:
      ml-network:
        ipv4_address: 172.20.0.10
    depends_on:
      ml-postgres:
        condition: service_healthy
      ml-redis:
        condition: service_healthy
      ml-minio:
        condition: service_healthy
      ml-mlflow:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ml-housing-linear:
    image: ml-housing-linear:latest
    container_name: ml-housing-linear
    environment:
      PYTHONPATH: /app
      MLFLOW_TRACKING_URI: http://ml-mlflow:5000
    ports:
      - "8002:8000"
    networks:
      ml-network:
        ipv4_address: 172.20.0.11
    depends_on:
      ml-postgres:
        condition: service_healthy
      ml-redis:
        condition: service_healthy
      ml-minio:
        condition: service_healthy
      ml-mlflow:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ml-titanic-automl:
    image: ml-titanic-automl:latest
    container_name: ml-titanic-automl
    environment:
      PYTHONPATH: /app
      MLFLOW_TRACKING_URI: http://ml-mlflow:5000
      DATABASE_URL: postgresql://postgres:${ML_POSTGRES_PASSWORD}@ml-postgres:5432/mldb
    ports:
      - "8003:8000"
    networks:
      ml-network:
        ipv4_address: 172.20.0.12
    depends_on:
      ml-postgres:
        condition: service_healthy
      ml-redis:
        condition: service_healthy
      ml-mlflow:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Platform service: admin-portal ──────────────────────────────────────────
  # Admin-only dashboard at /admin/ — reads from analytics.visitor_events,
  # renders Jinja2 HTML, protected by HTTP Basic Auth.
  admin-portal:
    image: admin-portal:latest
    container_name: admin-portal
    environment:
      DATABASE_URL: postgresql://postgres:${ML_POSTGRES_PASSWORD}@ml-postgres:5432/mldb
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      # Same salt as the analytics-ingester — keeps ip_hash values consistent
      # so rate-limiting can match a visitor across the two services.
      ANALYTICS_IP_SALT: ${ANALYTICS_IP_SALT}
    networks:
      ml-network:
        ipv4_address: 172.20.0.31
    depends_on:
      ml-postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Platform service: analytics-ingester ────────────────────────────────────
  # Tails Nginx JSON log → enriches (IP hash + bot detection) → writes to
  # analytics.visitor_events in ml-postgres. Cross-cutting infra, not a demo.
  analytics-ingester:
    image: analytics-ingester:latest
    container_name: analytics-ingester
    environment:
      DATABASE_URL: postgresql://postgres:${ML_POSTGRES_PASSWORD}@ml-postgres:5432/mldb
      ANALYTICS_IP_SALT: ${ANALYTICS_IP_SALT}
      LOG_PATH: /logs/access.json.log
      CHECKPOINT_PATH: /checkpoint/state.json
      POLL_INTERVAL_SECONDS: "2"
    volumes:
      - /volume1/pandya-homelab/logs/nginx:/logs:ro
      - analytics_ingester_checkpoint:/checkpoint
    networks:
      ml-network:
        ipv4_address: 172.20.0.30
    depends_on:
      ml-postgres:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  analytics_ingester_checkpoint:
