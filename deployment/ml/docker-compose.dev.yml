version: '3.8'

# Dev overlay: adds ML project containers to the ml-network infrastructure stack
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:
  ml-iris-knn:
    image: ml-iris-knn:latest
    container_name: ml-iris-knn
    environment:
      PYTHONPATH: /app
    ports:
      - "8001:8000"
    networks:
      ml-network:
        ipv4_address: 172.20.0.10
    depends_on:
      ml-postgres:
        condition: service_healthy
      ml-redis:
        condition: service_healthy
      ml-minio:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ml-housing-linear:
    image: ml-housing-linear:latest
    container_name: ml-housing-linear
    environment:
      PYTHONPATH: /app
    ports:
      - "8002:8000"
    networks:
      ml-network:
        ipv4_address: 172.20.0.11
    depends_on:
      ml-postgres:
        condition: service_healthy
      ml-redis:
        condition: service_healthy
      ml-minio:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
