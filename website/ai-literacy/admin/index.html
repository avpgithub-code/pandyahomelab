<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Literacy — Admin</title>
<!-- Forward to the Google Apps Script admin dashboard (Google-login protected). -->
<meta http-equiv="refresh" content="0; url=https://script.google.com/macros/s/AKfycbykAKmiSczu0UbJqrcxVX0vyXAAEQYfeHLME4Jfvmt2tdKy781rY86kX9plps4sFe8n7w/exec">
<style>
  body{margin:0;min-height:100vh;display:grid;place-items:center;
    font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#fff;
    background:radial-gradient(120% 90% at 12% 6%,#ff2d78 0%,transparent 42%),
               radial-gradient(110% 80% at 88% 14%,#7b2ff7 0%,transparent 45%),
               linear-gradient(160deg,#2a0f47,#160726 60%,#0d0418)}
  .box{text-align:center;padding:30px}
  .spin{width:42px;height:42px;border-radius:50%;margin:0 auto 18px;
    border:3px solid rgba(255,255,255,.25);border-top-color:#a8e22a;animation:s 1s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
  h1{font-size:1.2rem;font-weight:700;margin-bottom:8px}
  p{color:rgba(255,255,255,.75);font-size:.92rem}
  a{color:#a8e22a;font-weight:600}
</style>
</head>

    <div class="spin"></div>
    <h1>Opening the Admin dashboard…</h1>
    <p>Redirecting to the secure (Google sign-in) admin console.<br>
       If it doesn't open automatically,
       <a href="https://script.google.com/macros/s/AKfycbykAKmiSczu0UbJqrcxVX0vyXAAEQYfeHLME4Jfvmt2tdKy781rY86kX9plps4sFe8n7w/exec">click here</a>.</p>
  </div>
  <script>
    location.replace("https://script.google.com/macros/s/AKfycbykAKmiSczu0UbJqrcxVX0vyXAAEQYfeHLME4Jfvmt2tdKy781rY86kX9plps4sFe8n7w/exec");
